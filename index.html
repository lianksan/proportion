<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proportion</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<main>
  <div class="proportion">
    <div class="fraction">
      <div class="cell-wrapper" id="wrapR">
        <span class="cell-label">A</span>
        <input class="cell" id="cellR" type="text" inputmode="decimal" pattern="[0-9.,]*" placeholder="A" data-index="0" autofocus>
        <div class="hotkey-hint hint-bottom"><kbd>R</kbd> or <kbd>A</kbd></div>
        <div class="cell-result" id="resultR"></div>
      </div>
      <div class="fraction-bar">
        <svg viewBox="0 0 400 10" preserveAspectRatio="none"><line x1="2" y1="6" x2="70" y2="3" /><line x1="70" y1="3" x2="160" y2="7" /><line x1="160" y1="7" x2="260" y2="3" /><line x1="260" y1="3" x2="398" y2="5.5" /></svg>
      </div>
      <div class="cell-wrapper" id="wrapF">
        <div class="hotkey-hint hint-top"><kbd>F</kbd> or <kbd>B</kbd></div>
        <span class="cell-label">B</span>
        <input class="cell" id="cellF" type="text" inputmode="decimal" pattern="[0-9.,]*" placeholder="B" data-index="1">
        <div class="cell-result" id="resultF"></div>
      </div>
    </div>

    <div class="equals-wrap" id="equalsWrap">
      <svg class="equals-svg" viewBox="0 0 50 40">
        <line x1="3" y1="14.2" x2="12" y2="13.8" />
        <line x1="12" y1="13.8" x2="28" y2="14.5" />
        <line x1="28" y1="14.5" x2="38" y2="13.7" />
        <line x1="38" y1="13.7" x2="47" y2="14.3" />
        <line x1="3" y1="25.8" x2="15" y2="26.3" />
        <line x1="15" y1="26.3" x2="30" y2="25.6" />
        <line x1="30" y1="25.6" x2="40" y2="26.2" />
        <line x1="40" y1="26.2" x2="47" y2="25.8" />
      </svg>
      <div class="equals-strike"></div>
    </div>

    <div class="fraction">
      <div class="cell-wrapper" id="wrapU">
        <span class="cell-label">C</span>
        <input class="cell" id="cellU" type="text" inputmode="decimal" pattern="[0-9.,]*" placeholder="C" data-index="2">
        <div class="hotkey-hint hint-bottom"><kbd>U</kbd> or <kbd>C</kbd></div>
        <div class="cell-result" id="resultU"></div>
      </div>
      <div class="fraction-bar">
        <svg viewBox="0 0 400 10" preserveAspectRatio="none"><line x1="2" y1="4" x2="90" y2="7" /><line x1="90" y1="7" x2="200" y2="3" /><line x1="200" y1="3" x2="310" y2="6" /><line x1="310" y1="6" x2="398" y2="3.5" /></svg>
      </div>
      <div class="cell-wrapper" id="wrapJ">
        <div class="hotkey-hint hint-top"><kbd>J</kbd> or <kbd>D</kbd></div>
        <span class="cell-label">D</span>
        <input class="cell" id="cellJ" type="text" inputmode="decimal" pattern="[0-9.,]*" placeholder="D" data-index="3">
        <div class="cell-result" id="resultJ"></div>
      </div>
    </div>
  </div>

  <div id="goodValues" class="good-values"></div>
</main>

<footer>
  <div class="credit">
    Developed by <a href="https://liankevich.com" target="_blank" class="credit-link"><img src="me.png" alt="" class="credit-avatar"><span>Paulik</span></a> and&nbsp;<a href="https://claude.ai/new" target="_blank"><span>Claude</span></a>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
